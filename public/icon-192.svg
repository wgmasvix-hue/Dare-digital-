<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#166534"/>
  <!-- Kente stripe accent -->
  <rect x="0" y="150" width="192" height="18" fill="#D97706"/>
  <rect x="0" y="168" width="192" height="24" fill="#C2410C"/>
  <!-- Open book shape -->
  <g transform="translate(96,88)">
    <!-- Left page -->
    <path d="M-4,-44 L-52,-36 L-52,36 L-4,28 Z" fill="white" opacity="0.95"/>
    <!-- Right page -->
    <path d="M4,-44 L52,-36 L52,36 L4,28 Z" fill="white" opacity="0.85"/>
    <!-- Spine -->
    <rect x="-4" y="-44" width="8" height="72" fill="#D97706"/>
    <!-- Text lines left -->
    <rect x="-44" y="-20" width="32" height="4" rx="2" fill="#166534" opacity="0.4"/>
    <rect x="-44" y="-10" width="28" height="4" rx="2" fill="#166534" opacity="0.4"/>
    <rect x="-44" y="0" width="32" height="4" rx="2" fill="#166534" opacity="0.4"/>
    <rect x="-44" y="10" width="24" height="4" rx="2" fill="#166534" opacity="0.4"/>
    <!-- Text lines right -->
    <rect x="12" y="-20" width="32" height="4" rx="2" fill="#166534" opacity="0.3"/>
    <rect x="12" y="-10" width="28" height="4" rx="2" fill="#166534" opacity="0.3"/>
    <rect x="12" y="0" width="32" height="4" rx="2" fill="#166534" opacity="0.3"/>
    <rect x="12" y="10" width="24" height="4" rx="2" fill="#166534" opacity="0.3"/>
  </g>
  <!-- DARE text -->
  <text x="96" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="22" fill="white" letter-spacing="6">DARE</text>
</svg>

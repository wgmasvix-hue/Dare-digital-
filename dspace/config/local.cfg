##########################################################################
# Harare Polytechnic Digital Repository — DSpace Local Configuration
##########################################################################

# ── Site Identity ──────────────────────────────────────────────────────
dspace.name = Harare Polytechnic Digital Repository
dspace.hostname = 192.168.26.3
dspace.baseUrl = http://192.168.26.3:8080
dspace.ui.url = http://192.168.26.3:4000
dspace.server.url = http://192.168.26.3:8080/server

# Server hostname: hrepolyREP  |  Static IP: 192.168.26.3
# If DNS resolves hrepolyREP, replace 192.168.26.3 with hrepolyREP above

# ── Database ───────────────────────────────────────────────────────────
db.url = jdbc:postgresql://dspacedb:5432/dspace
db.username = dspace
db.password = dspace_secret_2024
db.maxconnections = 30

# ── Solr ───────────────────────────────────────────────────────────────
solr.server = http://dspacesolr:8983/solr

# ── Mail ───────────────────────────────────────────────────────────────
mail.server = localhost
mail.server.port = 25
mail.from.address = dspace@hararepolytechnic.ac.zw
mail.feedback.recipient = admin@hararepolytechnic.ac.zw
mail.admin = admin@hararepolytechnic.ac.zw
mail.alert.recipient = admin@hararepolytechnic.ac.zw

# ── Handle Server ─────────────────────────────────────────────────────
# Use local handles until you register a prefix with CNRI
handle.canonical.prefix = http://localhost:8080/handle/
handle.prefix = 123456789

# ── Authentication ────────────────────────────────────────────────────
# Allow self-registration for Harare Polytechnic email domain
authentication-password.domain.valid = hararepolytechnic.ac.zw

# ── Assetstore ────────────────────────────────────────────────────────
assetstore.dir = ${dspace.dir}/assetstore

# ── Locale ────────────────────────────────────────────────────────────
default.locale = en
webui.supported.locales = en

# ── Usage Statistics ──────────────────────────────────────────────────
usage-statistics.dbfile = ${dspace.dir}/log/usage-statistics.db

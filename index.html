<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>DARE Digital Library</title>
    <meta name="description" content="Zimbabwe's premier open-access digital library — books, research, AI tutor DARA, and 250M+ academic papers." />
    <meta name="theme-color" content="#166534" />

    <!-- PWA icons -->
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DARE" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="DARE Digital Library" />
    <meta property="og:description" content="Zimbabwe's premier open-access digital library." />
    <meta property="og:image" content="/icon-512.svg" />
  </head>
  <body>
    <div id="root">
      <style>
        .initial-loader {
          position: fixed;
          top: 0; left: 0; right: 0; bottom: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background-color: #fafafa;
          font-family: system-ui, -apple-system, sans-serif;
        }
        .spinner {
          width: 40px; height: 40px;
          border: 3px solid rgba(16, 185, 129, 0.2);
          border-radius: 50%;
          border-top-color: #10b981;
          animation: spin 1s ease-in-out infinite;
          margin-bottom: 16px;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="initial-loader">
        <div class="spinner"></div>
        <div style="color: #6b7280; font-size: 14px; font-weight: 500;">Loading DARE Library...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
